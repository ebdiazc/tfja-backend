[variables]
PYTHON_VERSION = "3.11"
PLAYWRIGHT_BROWSERS_PATH = "/app/ms-playwright"

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium",
  "playwright install-deps chromium"
]

[start]
cmd = "gunicorn app:app --timeout 180 --workers 1 --bind 0.0.0.0:$PORT"
